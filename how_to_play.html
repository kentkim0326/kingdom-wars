<script>
const HOW = {
  ko:{title:"플레이 방법",sub:"5분 만에 달 정복 마스터하기",cta:"🚀 지금 시작하기",
    body:`
    <div class="kw-section"><h2>🎯 목표</h2>
    <p>달의 <strong>49개 섹터를 모두 정복</strong>하면 승리합니다. 반대로 모든 영토를 잃으면 패배합니다.</p></div>
    <div class="kw-section"><h2>📋 게임 시작</h2>
    <ul>
      <li><strong>1. 국가 선택</strong> — 34개국 중 당신의 국가를 선택</li>
      <li><strong>2. 사령관 선택</strong> — 남성/여성 사령관 중 선택 (각기 다른 보너스)</li>
      <li><strong>3. 전투 시작</strong> — 시작 섹터에서 영토 확장</li>
    </ul></div>
    <div class="kw-section"><h2>⚔️ 전투 방법</h2>
    <ul>
      <li><strong>빈 섹터 클릭</strong> → 유닛 배치로 영토 확장 (안개 걷힘)</li>
      <li><strong>적 섹터 클릭</strong> → 공격 방식 선택: 정면돌격 / 정밀타격(+20%) / 포위공격(인접 아군당 +15%)</li>
      <li><strong>출격 모달</strong>에서 유닛 수량 조절 후 🚀 출격!</li>
    </ul></div>
    <div class="kw-section"><h2>💰 자원 관리</h2>
    <ul>
      <li><strong>⚡ He-3</strong> — 유닛 구매·생산의 핵심 자원</li>
      <li><strong>💎 레골리스 / 💧 H₂O</strong> — 특수 자원, H₂O 부족시 생산 감소</li>
      <li><strong>🪙 코인</strong> — 유닛 구매(500)·교환소 이용</li>
      <li>턴 종료마다 섹터당 H₂O 유지비 소모 — 무한 확장은 위험!</li>
    </ul></div>
    <div class="kw-section"><h2>🔥 중독 요소 활용</h2>
    <ul>
      <li><strong>킬 스트릭</strong> — 연승할수록 전투력 상승(최대 +60%). 패배시 리셋!</li>
      <li><strong>전투 등급</strong> — S등급 압도적 승리시 보상 2배 + 희귀 유닛 드랍</li>
      <li><strong>사기</strong> — 높게 유지하면 전투력 +, 승리로 회복</li>
      <li><strong>업적·미션</strong> — 좌측 미션 완료로 보상 획득</li>
    </ul></div>
    <div class="kw-section"><h2>💡 초보자 팁</h2>
    <p>첫 5턴은 적이 공격하지 않습니다. 이 시간에 <strong>빈 섹터를 최대한 점령</strong>하여 자원 생산을 늘리세요. 유닛이 부족하면 턴 종료(전투기 1대 자동 지급) 또는 구매 버튼을 활용하세요.</p></div>`},
  en:{title:"How to Play",sub:"Master lunar conquest in 5 minutes",cta:"🚀 Play Now",
    body:`
    <div class="kw-section"><h2>🎯 Objective</h2>
    <p>Win by <strong>conquering all 49 lunar sectors</strong>. Lose if you lose all your territory.</p></div>
    <div class="kw-section"><h2>📋 Getting Started</h2>
    <ul>
      <li><strong>1. Choose a Nation</strong> — Pick your nation from 34 options</li>
      <li><strong>2. Choose a Commander</strong> — Male/female commander (each with unique bonuses)</li>
      <li><strong>3. Begin Battle</strong> — Expand from your starting sector</li>
    </ul></div>
    <div class="kw-section"><h2>⚔️ How to Fight</h2>
    <ul>
      <li><strong>Click an empty sector</strong> → Deploy units to expand (lifts the fog)</li>
      <li><strong>Click an enemy sector</strong> → Choose attack: Direct Assault / Precision Strike (+20%) / Encirclement (+15% per adjacent ally)</li>
      <li>Adjust unit counts in the <strong>fleet modal</strong>, then 🚀 Launch!</li>
    </ul></div>
    <div class="kw-section"><h2>💰 Resource Management</h2>
    <ul>
      <li><strong>⚡ He-3</strong> — Core resource for buying and producing units</li>
      <li><strong>💎 Regolith / 💧 H₂O</strong> — Special resources; low H₂O cuts production</li>
      <li><strong>🪙 Coins</strong> — Buy units (500) and use the exchange</li>
      <li>Each turn costs H₂O upkeep per sector — endless expansion is risky!</li>
    </ul></div>
    <div class="kw-section"><h2>🔥 Using the Hooks</h2>
    <ul>
      <li><strong>Kill Streaks</strong> — Chain wins for up to +60% power. Resets on loss!</li>
      <li><strong>Battle Grades</strong> — An S-grade flawless win doubles rewards + drops rare units</li>
      <li><strong>Morale</strong> — Keep it high for bonus power; wins restore it</li>
      <li><strong>Achievements & Missions</strong> — Complete left-panel missions for rewards</li>
    </ul></div>
    <div class="kw-section"><h2>💡 Beginner Tips</h2>
    <p>Enemies don't attack for the first 5 turns. Use this time to <strong>capture as many empty sectors as possible</strong> to boost production. If you run low on units, end your turn (auto-grants 1 fighter) or use the buy button.</p></div>`},
  ja:{title:"遊び方",sub:"5分で月征服をマスター",cta:"🚀 今すぐプレイ",
    body:`
    <div class="kw-section"><h2>🎯 目標</h2>
    <p>月の<strong>49セクターをすべて征服</strong>すれば勝利です。逆にすべての領土を失うと敗北します。</p></div>
    <div class="kw-section"><h2>📋 ゲーム開始</h2>
    <ul>
      <li><strong>1. 国家選択</strong> — 34カ国からあなたの国を選択</li>
      <li><strong>2. 司令官選択</strong> — 男性/女性司令官から選択（それぞれ異なるボーナス）</li>
      <li><strong>3. 戦闘開始</strong> — 開始セクターから領土を拡大</li>
    </ul></div>
    <div class="kw-section"><h2>⚔️ 戦闘方法</h2>
    <ul>
      <li><strong>空セクターをクリック</strong> → ユニット配置で領土拡大（霧が晴れる）</li>
      <li><strong>敵セクターをクリック</strong> → 攻撃方式を選択：正面突撃 / 精密打撃(+20%) / 包囲攻撃(隣接味方ごと+15%)</li>
      <li><strong>出撃モーダル</strong>でユニット数を調整して🚀出撃！</li>
    </ul></div>
    <div class="kw-section"><h2>💰 資源管理</h2>
    <ul>
      <li><strong>⚡ He-3</strong> — ユニット購入・生産の核心資源</li>
      <li><strong>💎 レゴリス / 💧 H₂O</strong> — 特殊資源、H₂O不足時に生産減少</li>
      <li><strong>🪙 コイン</strong> — ユニット購入(500)・交換所利用</li>
      <li>ターン終了ごとにセクターごとのH₂O維持費が消費 — 無限拡張は危険！</li>
    </ul></div>
    <div class="kw-section"><h2>🔥 中毒要素の活用</h2>
    <ul>
      <li><strong>連勝</strong> — 連勝するほど戦闘力上昇(最大+60%)。敗北でリセット！</li>
      <li><strong>戦闘グレード</strong> — Sグレード圧倒的勝利で報酬2倍＋レアユニットドロップ</li>
      <li><strong>士気</strong> — 高く保てば戦闘力+、勝利で回復</li>
      <li><strong>実績・ミッション</strong> — 左側ミッション完了で報酬獲得</li>
    </ul></div>
    <div class="kw-section"><h2>💡 初心者のヒント</h2>
    <p>最初の5ターンは敵が攻撃しません。この時間に<strong>空セクターをできるだけ占領</strong>して資源生産を増やしましょう。ユニットが不足したらターン終了（戦闘機1機自動支給）または購入ボタンを活用してください。</p></div>`},
  zh:{title:"游戏玩法",sub:"5分钟掌握月球征服",cta:"🚀 立即游玩",
    body:`
    <div class="kw-section"><h2>🎯 目标</h2>
    <p><strong>征服月球全部49个区域</strong>即可获胜。反之，失去所有领土则失败。</p></div>
    <div class="kw-section"><h2>📋 游戏开始</h2>
    <ul>
      <li><strong>1. 选择国家</strong> — 从34个国家中选择你的国家</li>
      <li><strong>2. 选择指挥官</strong> — 男性/女性指挥官（各具不同加成）</li>
      <li><strong>3. 开始战斗</strong> — 从初始区域扩张领土</li>
    </ul></div>
    <div class="kw-section"><h2>⚔️ 战斗方法</h2>
    <ul>
      <li><strong>点击空区域</strong> → 部署兵种扩张领土（驱散迷雾）</li>
      <li><strong>点击敌方区域</strong> → 选择攻击方式：正面强攻 / 精准打击(+20%) / 包围攻击(每个相邻友军+15%)</li>
      <li>在<strong>出击窗口</strong>调整兵种数量后🚀出击！</li>
    </ul></div>
    <div class="kw-section"><h2>💰 资源管理</h2>
    <ul>
      <li><strong>⚡ 氦-3</strong> — 购买和生产兵种的核心资源</li>
      <li><strong>💎 风化层 / 💧 H₂O</strong> — 特殊资源，H₂O不足时生产减少</li>
      <li><strong>🪙 金币</strong> — 购买兵种(500)·使用交易所</li>
      <li>每回合每个区域消耗H₂O维护费 — 无限扩张有风险！</li>
    </ul></div>
    <div class="kw-section"><h2>🔥 善用上瘾机制</h2>
    <ul>
      <li><strong>连胜</strong> — 连胜越多战斗力越高(最高+60%)。失败即重置！</li>
      <li><strong>战斗评级</strong> — S级压倒性胜利奖励翻倍+掉落稀有兵种</li>
      <li><strong>士气</strong> — 保持高士气获得战斗力加成，胜利可恢复</li>
      <li><strong>成就·任务</strong> — 完成左侧任务获取奖励</li>
    </ul></div>
    <div class="kw-section"><h2>💡 新手提示</h2>
    <p>前5回合敌人不会进攻。利用这段时间<strong>尽可能占领空区域</strong>以提升资源生产。兵种不足时，可结束回合（自动获得1架战斗机）或使用购买按钮。</p></div>`},
};
function kwRenderPage(l){
  const d=HOW[l]||HOW.en;
  document.getElementById("p-title").textContent=d.title;
  document.getElementById("p-sub").textContent=d.sub;
  document.getElementById("p-body").innerHTML=d.body;
  document.getElementById("p-cta").textContent=d.cta;
}
</script>
</body>
</html>
